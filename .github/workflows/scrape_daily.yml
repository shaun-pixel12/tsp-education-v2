name: Manual crawler seed refresh

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-seeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crawler/package-lock.json

      - name: Install crawler dependencies
        run: npm ci
        working-directory: crawler

      - name: Refresh crawler staging data
        run: node scraper.js
        working-directory: crawler

      - name: Commit refreshed crawler artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crawler/staging_courses.json crawler/crawler_sources.json crawler/crawl_plan.json
          git diff --cached --quiet || git commit -m "Refresh crawler staging data"
          git push
